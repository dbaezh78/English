<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Vocabulario - English</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Encabezado -->
    <header class="bg-white border-b border-slate-200 py-4 px-6 shadow-xs shrink-0">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-xl font-bold text-slate-900">Repositorio de Archivos English</h1>
            <p class="text-xs text-slate-500">Explorando de forma automática los documentos en la carpeta <code class="bg-slate-100 px-1 rounded font-mono text-indigo-600 font-semibold">/doc</code></p>
        </div>
    </header>

    <!-- Contenedor Principal -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-4 lg:p-6 flex flex-col md:flex-row gap-6 overflow-hidden">
        
        <!-- Panel Izquierdo: Lista de Archivos -->
        <section class="w-full md:w-80 bg-white border border-slate-200 rounded-xl shadow-xs flex flex-col overflow-hidden shrink-0">
            <div class="p-4 border-b border-slate-100 bg-slate-50/70 flex justify-between items-center">
                <h2 class="font-semibold text-slate-700 text-sm tracking-wide uppercase">Documentos CSV</h2>
                <span id="fileCount" class="bg-slate-200 text-slate-700 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
            </div>
            <div id="fileList" class="divide-y divide-slate-100 overflow-y-auto flex-1 max-h-[250px] md:max-h-full">
                <!-- Se rellena automáticamente con JS -->
            </div>
        </section>

        <!-- Panel Derecho: Contenido del archivo seleccionado -->
        <section class="flex-1 bg-white border border-slate-200 rounded-xl shadow-xs flex flex-col overflow-hidden">
            <div class="p-4 border-b border-slate-100 bg-slate-50/70 flex justify-between items-center shrink-0">
                <h2 id="currentFileName" class="font-semibold text-slate-800 truncate text-sm sm:text-base">Contenido del Archivo</h2>
            </div>
            
            <!-- Vista de Tabla o Estado Inicial -->
            <div id="tableContainer" class="flex-1 overflow-auto p-4">
                <div class="h-full flex flex-col items-center justify-center text-slate-400 p-8 text-center">
                    <svg class="w-16 h-16 text-slate-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <p class="text-sm">Selecciona un archivo de la lista izquierda para desplegar su contenido en pantalla.</p>
                </div>
            </div>
        </section>

    </main>

    <!-- Vinculamos la lista de archivos primero -->
    <script src="archivos.js"></script>

    <!-- Lógica de renderizado automático -->
    <script>
        const fileList = document.getElementById('fileList');
        const fileCount = document.getElementById('fileCount');
        const currentFileName = document.getElementById('currentFileName');
        const tableContainer = document.getElementById('tableContainer');

        // Inicializar la aplicación al cargar la página
        document.addEventListener('DOMContentLoaded', () => {
            // Verificar si el archivo archivos.js cargó la variable correctamente
            if (typeof misArchivosCSV === 'undefined' || misArchivosCSV.length === 0) {
                fileList.innerHTML = `<p class="text-rose-600 text-sm p-4 text-center bg-rose-50">No se detectaron archivos en archivos.js.</p>`;
                return;
            }

            fileCount.textContent = misArchivosCSV.length;
            fileList.innerHTML = '';

            // Generar la lista lateral automáticamente
            misArchivosCSV.forEach(nombreArchivo => {
                const fileItem = document.createElement('button');
                fileItem.className = "w-full text-left px-4 py-3 text-sm text-slate-600 hover:bg-indigo-50/50 hover:text-indigo-600 transition-all duration-150 flex items-center gap-3 border-l-2 border-transparent focus:outline-none cursor-pointer";
                fileItem.innerHTML = `
                    <svg class="w-4 h-4 text-emerald-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span class="truncate font-medium">${nombreArchivo}</span>
                `;

                // Evento clic para cargar el CSV relativo sin pedir credenciales
                fileItem.addEventListener('click', () => {
                    document.querySelectorAll('#fileList button').forEach(btn => btn.classList.remove('bg-indigo-50', 'text-indigo-600', 'border-indigo-500'));
                    fileItem.classList.add('bg-indigo-50', 'text-indigo-600', 'border-indigo-500');
                    
                    cargarYMostrarCSV(nombreArchivo);
                });

                fileList.appendChild(fileItem);
            });
        });

        // Carga el archivo desde la ruta relativa /doc/nombre_archivo.csv
        async function cargarYMostrarCSV(nombre) {
            currentFileName.textContent = `Visualizando: ${nombre}`;
            tableContainer.innerHTML = '<div class="h-full flex items-center justify-center text-slate-400 text-sm">Cargando datos locales...</div>';

            try {
                // Hacemos el fetch directo a tu subcarpeta local 'doc'
                const response = await fetch(`doc/${nombre}`);
                if (!response.ok) throw new Error('No se pudo leer el archivo. Verifica que esté en la carpeta /doc.');
                
                const texto = await response.text();
                const lineas = texto.split(/\r?\n/);
                
                if (lineas.length === 0 || lineas[0].trim() === "") {
                    tableContainer.innerHTML = '<div class="h-full flex items-center justify-center text-amber-600 text-sm">El archivo está vacío.</div>';
                    return;
                }

                // Armado estructurado de la tabla
                let htmlTabla = `<div class="inline-block min-w-full align-middle border border-slate-200 rounded-lg overflow-hidden shadow-xs">
                                    <table class="min-w-full divide-y divide-slate-200 text-left text-xs sm:text-sm">`;

                lineas.forEach((linea, index) => {
                    if (linea.trim() === "") return; // Ignorar saltos de línea vacíos
                    
                    const columnas = linea.split(',');
                    
                    if (index === 0) {
                        htmlTabla += `<thead class="bg-slate-100 font-semibold text-slate-700"><tr>`;
                        columnas.forEach(col => {
                            htmlTabla += `<th class="px-4 py-3 tracking-wide">${limpiarComillas(col)}</th>`;
                        });
                        htmlTabla += `</tr></thead><tbody class="divide-y divide-slate-200 bg-white text-slate-600">`;
                    } else {
                        htmlTabla += `<tr class="hover:bg-slate-50/80 transition-colors">`;
                        columnas.forEach(col => {
                            htmlTabla += `<td class="px-4 py-2.5 whitespace-nowrap border-r border-slate-100 last:border-r-0">${limpiarComillas(col)}</td>`;
                        });
                        htmlTabla += `</tr>`;
                    }
                });

                htmlTabla += `</tbody></table></div>`;
                tableContainer.innerHTML = htmlTabla;

            } catch (error) {
                tableContainer.innerHTML = `<div class="h-full flex items-center justify-center text-rose-600 text-sm">Error: ${error.message}</div>`;
            }
        }

        function limpiarComillas(str) {
            return str.replace(/^"|"$/g, '').trim();
        }
    </script>
</body>
</html>
